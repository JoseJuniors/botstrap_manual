<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual HTML</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #020617);
    scroll-behavior: smooth;
}

/* EFECTOS NECESARIOS */
.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #0ea5e9;
    transition: 0.3s;
}

.img-etiqueta {
    width: 100%;
    border-radius: 10px;
}

.titulo-img { position: relative; }

.titulo-texto {
    position: absolute;
    top: 70%;
    left: 56%;
    transform: translate(-50%, -50%);
    font-size: 25px;
    font-weight: bold;
    color: #80047c;
    text-shadow: 0 0 10px rgb(67, 228, 240);
}

/* MODAL ANIMADO */
.modal.fade .modal-dialog {
    transform: scale(0.8);
    transition: 0.3s;
}
.modal.show .modal-dialog {
    transform: scale(1);
}
</style>
</head>

<body class="text-white">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark sticky-top px-3 shadow">
    <span class="navbar-brand">⚡ Manual HTML ⚡</span>

    <input id="buscador" class="form-control w-25" placeholder="Buscar etiqueta...">

    <div>
        <a href="#estructura" class="btn btn-outline-info btn-sm">Estructura</a>
        <a href="#texto" class="btn btn-outline-info btn-sm">Texto</a>
        <a href="#media" class="btn btn-outline-info btn-sm">Media</a>
        <a href="#form" class="btn btn-outline-info btn-sm">Form</a>
        <a href="#tabla" class="btn btn-outline-info btn-sm">Tabla</a>
    </div>
</nav>

<div class="container py-4">

<h2 id="estructura" class="border-start border-info border-4 ps-3 mt-4">📦 Estructura</h2>
<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 cards" id="estructuraCards"></div>

<h2 id="texto" class="border-start border-info border-4 ps-3 mt-5">📝 Texto</h2>
<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 cards" id="textoCards"></div>

<h2 id="media" class="border-start border-info border-4 ps-3 mt-5">🎬 Multimedia</h2>
<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 cards" id="mediaCards"></div>

<h2 id="form" class="border-start border-info border-4 ps-3 mt-5">📋 Formularios</h2>
<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 cards" id="formCards"></div>

<h2 id="tabla" class="border-start border-info border-4 ps-3 mt-5">📊 Tablas</h2>
<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 cards" id="tablaCards"></div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalGlobal">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content bg-dark text-white rounded-4 shadow-lg">

      <div class="modal-header">
        <h5 id="modalTitulo"></h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <h6>📖 Descripción</h6>
        <p id="modalDesc"></p>

        <h6>🔓 Apertura / 🔒 Cierre</h6>
        <p id="modalEstructura"></p>

        <h6>💻 Código</h6>
        <button class="btn btn-success mb-2" onclick="copiarCodigo()">📋 Copiar código</button>
        <pre class="bg-black text-info p-3 rounded"><code id="modalCodigo"></code></pre>

        <h6>🧠 Cómo se usa</h6>
        <p id="modalUso"></p>

        <h6>👁️ Vista previa</h6>
        <div id="modalEjemplo" class="bg-light text-dark p-3 rounded"></div>

      </div>

    </div>
  </div>
</div>

<script>

// TOOLTIP ACTIVAR
document.addEventListener("DOMContentLoaded", () => {
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    tooltipTriggerList.map(t => new bootstrap.Tooltip(t))
});

// CREAR CARD
function crearCard(id, nombre, desc, codigo, ejemplo, uso) {
    return `
    <div class="col card-item" data-nombre="${nombre}">
        <div class="card bg-dark text-white border-info rounded-4 shadow h-100 p-3">

            <div class="titulo-img">
                <img src="image.png" class="img-etiqueta">
                <div class="titulo-texto">&lt;${nombre}&gt;</div>
            </div>

            <p class="mt-2">${desc}</p>

            <button class="btn btn-outline-info w-100 fw-semibold mt-auto"
                data-bs-toggle="modal"
                data-bs-target="#modalGlobal"
                data-bs-toggle="tooltip"
                title="Ver ejemplo completo"
                onclick="cargarModal('${nombre}', \`${desc}\`, \`${codigo}\`, \`${ejemplo}\`, \`${uso}\`)">
                Ver Código
            </button>

        </div>
    </div>`;
}

// MODAL
function cargarModal(nombre, desc, codigo, ejemplo, uso) {
    modalTitulo.innerText = "<" + nombre + ">";
    modalDesc.innerText = desc;
    modalCodigo.innerText = codigo;
    modalUso.innerText = uso;
    modalEjemplo.innerHTML = ejemplo;
    modalEstructura.innerText = "<" + nombre + "> ... </" + nombre + ">";
}

// COPIAR
function copiarCodigo() {
    navigator.clipboard.writeText(modalCodigo.innerText);
}

// BUSCADOR REAL
document.getElementById("buscador").addEventListener("keyup", function(){
    let valor = this.value.toLowerCase();
    document.querySelectorAll(".card-item").forEach(card=>{
        let nombre = card.getAttribute("data-nombre");
        card.style.display = nombre.includes(valor) ? "" : "none";
    });
});

// DATOS (igual)
estructuraCards.innerHTML += crearCard(1,"header","Encabezado principal","<header><h1>Mi web</h1></header>","<header class='bg-primary text-white p-2'>Mi web</header>","Se usa al inicio");
estructuraCards.innerHTML += crearCard(2,"main","Contenido principal","<main>Contenido</main>","<main class='bg-warning p-2'>Main</main>","Zona principal");
estructuraCards.innerHTML += crearCard(3,"section","Sección","<section>Texto</section>","<section class='bg-info p-2'>Sección</section>","Divide contenido");
estructuraCards.innerHTML += crearCard(4,"article","Contenido independiente","<article>Post</article>","<article class='bg-success p-2'>Artículo</article>","Para blogs");
estructuraCards.innerHTML += crearCard(5,"aside","Contenido lateral","<aside>Sidebar</aside>","<aside class='bg-secondary p-2 text-white'>Aside</aside>","Complementario");

textoCards.innerHTML += crearCard(6,"mark","Resalta texto","<mark>Importante</mark>","<p>Texto <mark>resaltado</mark></p>","Para destacar");
textoCards.innerHTML += crearCard(7,"blockquote","Cita","<blockquote>Texto</blockquote>","<blockquote class='border p-2'>Cita</blockquote>","Citas largas");
textoCards.innerHTML += crearCard(8,"cite","Referencia","<cite>Autor</cite>","<p><cite>Autor</cite></p>","Autor");
textoCards.innerHTML += crearCard(9,"abbr","Abreviatura","<abbr title='HTML'>HTML</abbr>","<abbr title='HyperText'>HTML</abbr>","Define abreviaciones");

mediaCards.innerHTML += crearCard(10,"figure","Contenedor","<figure></figure>","<figure class='bg-light p-2'>Imagen</figure>","Agrupa contenido");
mediaCards.innerHTML += crearCard(11,"figcaption","Descripción","<figcaption>Texto</figcaption>","<figcaption>Descripción</figcaption>","Pie de figura");
mediaCards.innerHTML += crearCard(12,"audio","Audio","<audio controls></audio>","<audio controls></audio>","Reproduce audio");
mediaCards.innerHTML += crearCard(13,"video","Video","<video controls></video>","<video width='100' controls></video>","Video");

formCards.innerHTML += crearCard(14,"fieldset","Grupo","<fieldset></fieldset>","<fieldset class='border p-2'>Grupo</fieldset>","Agrupa campos");
formCards.innerHTML += crearCard(15,"legend","Título","<legend>Datos</legend>","<legend>Formulario</legend>","Título grupo");
formCards.innerHTML += crearCard(16,"datalist","Lista","<datalist></datalist>","<input list='l'><datalist id='l'><option>Uno</option></datalist>","Sugerencias");
formCards.innerHTML += crearCard(17,"output","Resultado","<output></output>","<output>Resultado</output>","Mostrar resultado");

tablaCards.innerHTML += crearCard(18,"thead","Encabezado","<thead></thead>","<table><thead><tr><th>Col</th></tr></thead></table>","Parte superior");
tablaCards.innerHTML += crearCard(19,"tbody","Cuerpo","<tbody></tbody>","<table><tbody><tr><td>Dato</td></tr></tbody></table>","Datos");
tablaCards.innerHTML += crearCard(20,"tfoot","Pie","<tfoot></tfoot>","<table><tfoot><tr><td>Total</td></tr></tfoot></table>","Pie tabla");

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
